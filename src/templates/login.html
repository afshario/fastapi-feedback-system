{% extends "base.html" %}

{% block title %}ورود{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-700 py-12 px-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-8 text-white text-center">
            <h1 class="text-3xl font-bold">ورود به حساب</h1>
            <p class="mt-2 text-blue-100">خوش آمدید</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">ایمیل</label>
                    <input type="email" id="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">رمز عبور</label>
                    <input type="password" id="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
                    ورود
                </button>
            </form>

            <p class="text-center mt-6 text-gray-600">
                حساب ندارید؟ 
                <a href="/register" class="text-blue-600 hover:underline">ثبت نام کنید</a>
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
    };

    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
            // ذخیره توکن به صورت صحیح
            localStorage.setItem('access_token', data.access_token);
            console.log("Token saved successfully"); // برای دیباگ

            alert('ورود با موفقیت انجام شد');
            window.location.href = '/';   // به صفحه اصلی برو
        } else {
            alert(data.detail || 'ایمیل یا رمز عبور اشتباه است');
        }
    } catch (error) {
        console.error(error);
        alert('خطا در ارتباط با سرور');
    }
});
</script>
{% endblock %}
